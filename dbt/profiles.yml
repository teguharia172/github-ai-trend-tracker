github_ai_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "../github_ai_trends.duckdb"
      schema: main
      threads: 4
    
    prod:
      type: duckdb
      # MotherDuck connection - token via DUCKDB_MOTHERDUCK_TOKEN env var
      path: "md:github_ai_analytics"
      schema: prod
      threads: 4

    ci:
      type: duckdb
      path: ":memory:"
      schema: ci_test
      threads: 2

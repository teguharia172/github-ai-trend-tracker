name: Linear Issue Sync

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  sync-linear:
    name: Sync issue status & comment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for LINEAR_API_KEY
        id: check_secret
        run: |
          if [ -n "${{ secrets.LINEAR_API_KEY }}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ LINEAR_API_KEY not configured — skipping Linear sync"
          fi

      - name: Extract Linear issue ID from branch
        if: steps.check_secret.outputs.has_secret == 'true'
        id: extract
        run: |
          # Support both push (GITHUB_REF_NAME) and PR (head_ref) events
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          echo "Branch: $BRANCH"

          # Extract GHT-XXX from branch name
          ISSUE_ID=$(echo "$BRANCH" | grep -oE 'GHT-[0-9]+' | head -1)

          if [ -z "$ISSUE_ID" ]; then
            echo "No Linear issue ID found in branch '$BRANCH' — skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue: $ISSUE_ID"
            echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

          # Capture commit context
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --pretty='%an' || echo 'Unknown')" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --pretty='%s' || echo 'No message')" >> "$GITHUB_OUTPUT"

      - name: Move Linear issue to In Progress or Done
        if: steps.check_secret.outputs.has_secret == 'true' && steps.extract.outputs.found == 'true'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          IS_MERGED="${{ github.event.pull_request.merged }}"

          # Fetch the issue's internal UUID and team states using identifier filter
          ISSUE_DATA=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issues(filter: { identifier: { eq: \\\"$ISSUE_ID\\\" } }) { nodes { id team { id states { nodes { id name type } } } } } }\" }" || echo '{}')

          ISSUE_UUID=$(echo "$ISSUE_DATA" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              nodes = d.get('data', {}).get('issues', {}).get('nodes', [])
              print(nodes[0]['id'] if nodes else '')
          except Exception:
              print('')
          ")

          if [ -z "$ISSUE_UUID" ]; then
            echo "⚠️  Could not find issue $ISSUE_ID — skipping status update"
            exit 0
          fi

          if [ "$IS_MERGED" = "true" ]; then
            TARGET_STATE_ID=$(echo "$ISSUE_DATA" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              states = d['data']['issues']['nodes'][0]['team']['states']['nodes']
              match = next((s['id'] for s in states if s.get('type') == 'completed'), None)
              if not match:
                  match = next((s['id'] for s in states if 'done' in s['name'].lower()), None)
              print(match or '')
          except Exception:
              print('')
            ")
            LABEL="Done"
          else
            TARGET_STATE_ID=$(echo "$ISSUE_DATA" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              states = d['data']['issues']['nodes'][0]['team']['states']['nodes']
              match = next((s['id'] for s in states if 'progress' in s['name'].lower()), None)
              print(match or '')
          except Exception:
              print('')
            ")
            LABEL="In Progress"
          fi

          if [ -z "$TARGET_STATE_ID" ]; then
            echo "⚠️  Could not find '$LABEL' state — skipping status update"
          else
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_UUID\\\", input: { stateId: \\\"$TARGET_STATE_ID\\\" }) { success } }\" }" \
              | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              if d['data']['issueUpdate']['success']:
                  print('✅ Moved to $LABEL')
              else:
                  print('❌ Failed to update status')
          except Exception as e:
              print(f'⚠️  Could not parse response: {e}')
          "
          fi

      - name: Post comment on Linear issue
        if: steps.check_secret.outputs.has_secret == 'true' && steps.extract.outputs.found == 'true'
        continue-on-error: true
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          SHA="${{ steps.extract.outputs.sha_short }}"
          AUTHOR="${{ steps.extract.outputs.author }}"
          MSG="${{ steps.extract.outputs.message }}"
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          GITHUB_SHA="${{ github.sha }}"

          if [ "$EVENT" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            IS_MERGED="${{ github.event.pull_request.merged }}"
            HEAD_REF="${{ github.head_ref }}"
            if [ "$IS_MERGED" = "true" ]; then
              COMMENT="✅ **Pull Request #${PR_NUM} merged** into \`main\`

          **Commit:** [${SHA}](https://github.com/${REPO}/commit/${GITHUB_SHA})
          **Author:** ${AUTHOR}
          **Message:** ${MSG}
          **PR:** [#${PR_NUM} — View on GitHub](${PR_URL})"
            else
              COMMENT="🔀 **Pull Request #${PR_NUM} opened** on \`${HEAD_REF}\`

          **Commit:** [${SHA}](https://github.com/${REPO}/commit/${GITHUB_SHA})
          **Author:** ${AUTHOR}
          **Message:** ${MSG}
          **PR:** [#${PR_NUM} — View on GitHub](${PR_URL})"
            fi
          else
            COMMIT_URL="https://github.com/${REPO}/commit/${GITHUB_SHA}"
            COMMENT="🚀 **Commit pushed** to \`${GITHUB_REF_NAME}\`

          **Commit:** [\`${SHA}\`](${COMMIT_URL})
          **Author:** ${AUTHOR}
          **Message:** ${MSG}
          **Branch:** [View on GitHub](https://github.com/${REPO}/tree/${GITHUB_REF_NAME})"
          fi

          # Fetch issue UUID for the comment mutation
          ISSUE_UUID=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issues(filter: { identifier: { eq: \\\"$ISSUE_ID\\\" } }) { nodes { id } } }\" }" \
            | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              nodes = d.get('data', {}).get('issues', {}).get('nodes', [])
              print(nodes[0]['id'] if nodes else '')
          except Exception:
              print('')
          " || echo '')

          if [ -z "$ISSUE_UUID" ]; then
            echo "⚠️  Could not find issue $ISSUE_ID — skipping comment"
            exit 0
          fi

          # Escape the comment body for JSON
          ESCAPED_COMMENT=$(echo "$COMMENT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_UUID\\\", body: $ESCAPED_COMMENT }) { success } }\" }" \
            | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              if d['data']['commentCreate']['success']:
                  print('✅ Comment posted')
              else:
                  print('❌ Failed to post comment')
          except Exception as e:
              print(f'⚠️  Could not parse response: {e}')
          "

name: Linear Issue Sync

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  sync-linear:
    name: Sync issue status & comment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for LINEAR_API_KEY
        id: check_secret
        run: |
          if [ -n "${{ secrets.LINEAR_API_KEY }}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ LINEAR_API_KEY not configured — skipping Linear sync"
          fi

      - name: Extract Linear issue ID from branch
        if: steps.check_secret.outputs.has_secret == 'true'
        id: extract
        run: |
          # Support both push (GITHUB_REF_NAME) and PR (head_ref) events
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          echo "Branch: $BRANCH"

          # Extract GHT-XXX from branch name
          ISSUE_ID=$(echo "$BRANCH" | grep -oE 'GHT-[0-9]+' | head -1)

          if [ -z "$ISSUE_ID" ]; then
            echo "No Linear issue ID found in branch '$BRANCH' — skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue: $ISSUE_ID"
            echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

          # Capture commit context
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --pretty='%an')" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --pretty='%s')" >> "$GITHUB_OUTPUT"

      - name: Move Linear issue to In Progress or Done
        if: steps.check_secret.outputs.has_secret == 'true' && steps.extract.outputs.found == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          IS_MERGED="${{ github.event.pull_request.merged }}"

          # Fetch the issue's internal UUID and team states
          ISSUE_DATA=$(curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issue(id: \\\"$ISSUE_ID\\\") { id team { id states { nodes { id name type } } } } }\" }")

          ISSUE_UUID=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['issue']['id'])")

          if [ "$IS_MERGED" = "true" ]; then
            TARGET_STATE_ID=$(echo "$ISSUE_DATA" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          states = d['data']['issue']['team']['states']['nodes']
          # prefer type=completed, fallback to name match
          match = next((s['id'] for s in states if s.get('type') == 'completed'), None)
          if not match:
              match = next((s['id'] for s in states if 'done' in s['name'].lower()), None)
          print(match or '')
            ")
            LABEL="Done"
          else
            TARGET_STATE_ID=$(echo "$ISSUE_DATA" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          states = d['data']['issue']['team']['states']['nodes']
          match = next((s['id'] for s in states if 'progress' in s['name'].lower()), None)
          print(match or '')
            ")
            LABEL="In Progress"
          fi

          if [ -z "$TARGET_STATE_ID" ]; then
            echo "⚠️  Could not find '$LABEL' state — skipping status update"
          else
            curl -sf -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_UUID\\\", input: { stateId: \\\"$TARGET_STATE_ID\\\" }) { success } }\" }" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Moved to $LABEL' if d['data']['issueUpdate']['success'] else '❌ Failed to update status')"
          fi

      - name: Post comment on Linear issue
        if: steps.check_secret.outputs.has_secret == 'true' && steps.extract.outputs.found == 'true'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          SHA="${{ steps.extract.outputs.sha_short }}"
          AUTHOR="${{ steps.extract.outputs.author }}"
          MSG="${{ steps.extract.outputs.message }}"
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          GITHUB_SHA="${{ github.sha }}"

          if [ "$EVENT" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            IS_MERGED="${{ github.event.pull_request.merged }}"
            HEAD_REF="${{ github.head_ref }}"
            if [ "$IS_MERGED" = "true" ]; then
              COMMENT=$(cat << 'EOF'
          ✅ **Pull Request #${PR_NUM} merged** into `main`

          **Commit:** [${SHA}](https://github.com/${REPO}/commit/${GITHUB_SHA})
          **Author:** ${AUTHOR}
          **Message:** ${MSG}
          **PR:** [#${PR_NUM} — View on GitHub](${PR_URL})
          EOF
          )
            else
              COMMENT=$(cat << 'EOF'
          🔀 **Pull Request #${PR_NUM} opened** on `${HEAD_REF}`

          **Commit:** [${SHA}](https://github.com/${REPO}/commit/${GITHUB_SHA})
          **Author:** ${AUTHOR}
          **Message:** ${MSG}
          **PR:** [#${PR_NUM} — View on GitHub](${PR_URL})
          EOF
          )
            fi
          else
            COMMIT_URL="https://github.com/${REPO}/commit/${GITHUB_SHA}"
            COMMENT=$(cat << EOF
          🚀 **Commit pushed** to \`${GITHUB_REF_NAME}\`

          **Commit:** [\`${SHA}\`](${COMMIT_URL})
          **Author:** ${AUTHOR}
          **Message:** ${MSG}
          **Branch:** [View on GitHub](https://github.com/${REPO}/tree/${GITHUB_REF_NAME})
          EOF
          )
          fi

          # Fetch issue UUID for the comment mutation
          ISSUE_UUID=$(curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issue(id: \\\"$ISSUE_ID\\\") { id } }\" }" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['issue']['id'])")

          # Escape the comment body for JSON
          ESCAPED_COMMENT=$(echo "$COMMENT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_UUID\\\", body: $ESCAPED_COMMENT }) { success } }\" }" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Comment posted' if d['data']['commentCreate']['success'] else '❌ Failed to post comment')"

name: CI Failure Handler

on:
  workflow_run:
    workflows: ["CI Quality Gate"]
    types: [completed]

jobs:
  handle-failure:
    name: Handle CI Failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Extract branch and issue info
        id: extract
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
          # Extract GHT-XX from branch name
          if [[ $BRANCH =~ (GHT-[0-9]+) ]]; then
            echo "issue_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "found_issue=true" >> $GITHUB_OUTPUT
          else
            echo "found_issue=false" >> $GITHUB_OUTPUT
          fi
          
          # Get the run URL
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT

      - name: Comment on Linear issue
        if: steps.extract.outputs.found_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueKey = '${{ steps.extract.outputs.issue_key }}';
            const runUrl = '${{ steps.extract.outputs.run_url }}';
            const branch = '${{ steps.extract.outputs.branch }}';
            
            // Find failed jobs
            const runs = await github.rest.actions.listWorkflowRunAttempts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ steps.extract.outputs.run_id }}
            });
            
            // Get jobs for the run
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ steps.extract.outputs.run_id }}
            });
            
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            const failedJobNames = failedJobs.map(j => j.name).join(', ');
            
            // Create comment body
            const commentBody = `## ❌ CI Failed
            
            **Branch:** ${branch}
            **Failed Jobs:** ${failedJobNames}
            **Run URL:** ${runUrl}
            
            Please check the CI logs and fix the issues before merging.
            
            Common fixes:
            - Lint errors: Run \`make lint\` and \`make format\`
            - Test failures: Run \`make test\` locally
            - Commit message: Use \`git commit --amend\` to fix
            
            This comment was auto-generated by the CI Failure Handler.`;
            
            // Post comment to PR if exists
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`
            });
            
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: commentBody
              });
              console.log(`Commented on PR #${prs.data[0].number}`);
            }

      - name: Update Linear issue status
        if: steps.extract.outputs.found_issue == 'true' && env.LINEAR_API_KEY != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          ISSUE_KEY="${{ steps.extract.outputs.issue_key }}"
          RUN_URL="${{ steps.extract.outputs.run_url }}"
          BRANCH="${{ steps.extract.outputs.branch }}"
          
          # Find the Linear issue ID
          ISSUE_QUERY='{"query": "query { issues(filter: { identifier: { eq: \"'$ISSUE_KEY'\" } }) { nodes { id } } }"}'
          ISSUE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$ISSUE_QUERY" \
            https://api.linear.app/graphql)
          
          ISSUE_ID=$(echo "$ISSUE_RESPONSE" | jq -r '.data.issues.nodes[0].id')
          
          if [ -z "$ISSUE_ID" ] || [ "$ISSUE_ID" = "null" ]; then
            echo "Could not find Linear issue $ISSUE_KEY"
            exit 0
          fi
          
          # Add comment to Linear issue
          COMMENT_QUERY='{"query": "mutation { commentCreate(input: { issueId: \"'$ISSUE_ID'\", body: \"## ❌ CI Failed\\n\\n**Branch:** '$BRANCH'\\n**Run:** '$RUN_URL'\\n\\nPlease fix CI issues before merging.\" }) { success } }"}'
          
          curl -s -X POST \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_QUERY" \
            https://api.linear.app/graphql
          
          echo "Updated Linear issue $ISSUE_KEY with CI failure notice"

  handle-success:
    name: Handle CI Success
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Extract branch and issue info
        id: extract
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
          # Extract GHT-XX from branch name
          if [[ $BRANCH =~ (GHT-[0-9]+) ]]; then
            echo "issue_key=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "found_issue=true" >> $GITHUB_OUTPUT
          else
            echo "found_issue=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.extract.outputs.found_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.extract.outputs.branch }}';
            const issueKey = '${{ steps.extract.outputs.issue_key }}';
            
            // Find PR
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`
            });
            
            if (prs.data.length > 0) {
              // Check if we already commented
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number
              });
              
              const hasSuccessComment = comments.data.some(c => 
                c.body.includes('✅ CI Passed') && c.user.login === 'github-actions[bot]'
              );
              
              if (!hasSuccessComment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prs.data[0].number,
                  body: `## ✅ CI Passed
                  
                  All checks are green! This PR is ready for review.
                  
                  - Tests: Passing
                  - Lint: Clean
                  - Format: Valid
                  - Commit conventions: Valid
                  
                  Remember to link the Linear issue: \`Refs: ${issueKey}\``
                });
                console.log(`Commented on PR #${prs.data[0].number}`);
              }
            }

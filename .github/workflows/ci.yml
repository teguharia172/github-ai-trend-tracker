name: CI Quality Gate

on:
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check pipelines/ tests/ dashboard/

      - name: Check no hard dotenv import in dashboard
        run: |
          if grep -rn "^from dotenv" dashboard/ || grep -rn "^import dotenv" dashboard/; then
            echo "ERROR: dashboard/ must not have top-level dotenv imports (breaks Streamlit Cloud)"
            exit 1
          fi

      - name: Run tests
        run: pytest tests/ -v

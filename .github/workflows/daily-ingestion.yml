name: Daily Data Ingestion

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]  # Also run on pushes to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  ingest-data:
    name: Ingest GitHub AI Repository Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data ingestion
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          python -c "
          from pipelines.github_ai_repos import run_pipeline, AI_QUERIES
          
          info = run_pipeline(
              destination='motherduck',
              queries=AI_QUERIES,
              max_repos_per_query=50,
              min_stars=50
          )
          print('Ingestion complete!')
          print(info)
          "

      - name: Run dbt transformations
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DUCKDB_MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dbt
          dbt deps
          dbt build --target prod

  build-dashboard:
    name: Build Dashboard
    needs: ingest-data
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dashboard dependencies
        run: |
          cd dashboard
          rm -rf .evidence node_modules package-lock.json
          npm install

      - name: Build dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd dashboard
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/build

  deploy-dashboard:
    name: Deploy Dashboard to GitHub Pages
    needs: build-dashboard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

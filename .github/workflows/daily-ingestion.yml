name: Daily Data Ingestion

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]  # Also run on pushes to main

env:
  PYTHON_VERSION: '3.11'

jobs:
  ingest-data:
    name: Ingest GitHub AI Repository Data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data ingestion
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          python -c "
          from pipelines.github_ai_repos import run_pipeline, AI_QUERIES
          
          info = run_pipeline(
              destination='motherduck',
              queries=AI_QUERIES,
              max_repos_per_query=100,
              min_stars=10
          )
          print('Ingestion complete!')
          print(info)
          "

      - name: Run dbt transformations
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DUCKDB_MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dbt
          dbt deps
          dbt build --target prod

      - name: Trigger Streamlit Cloud redeploy
        run: |
          echo "✅ Data updated! Streamlit Cloud will auto-redeploy on next page load."
          echo "Dashboard: https://github-ai-trend-tracker.streamlit.app"
